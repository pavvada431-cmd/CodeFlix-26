version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: seethescience-backend
    env_file:
      - .env
    ports:
      - "4000:4000"
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: seethescience-frontend
    env_file:
      - .env
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
