<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-label="SeeTheScience">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="60%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#bg)" rx="18"/>

  <!-- Grid -->
  <g stroke="rgba(34,211,238,0.08)" stroke-width="0.8">
    <path d="M0 60 H1200 M0 120 H1200 M0 180 H1200 M0 240 H1200 M0 300 H1200"/>
    <path d="M60 0 V340 M180 0 V340 M300 0 V340 M420 0 V340 M540 0 V340 M660 0 V340 M780 0 V340 M900 0 V340 M1020 0 V340 M1140 0 V340"/>
  </g>

  <!-- Glow behind logo -->
  <circle cx="140" cy="170" r="170" fill="url(#glow)"/>

  <!-- Eye-of-science logo, enlarged -->
  <g transform="translate(60 90)">
    <rect width="160" height="160" rx="22" fill="#0b1020" stroke="url(#accent)" stroke-width="2"/>
    <!-- Lens -->
    <path d="M28 80 Q80 20 132 80 Q80 140 28 80 Z" fill="none" stroke="url(#accent)" stroke-width="4"/>
    <!-- Pupil -->
    <circle cx="80" cy="80" r="18" fill="url(#accent)"/>
    <circle cx="80" cy="80" r="6" fill="#0b1020"/>
    <!-- Sine wave -->
    <path d="M20 110 Q40 95 60 110 T100 110 T140 110" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(260 130)">
    <text font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-weight="800" font-size="72" fill="#f8fafc">See the</text>
    <text x="265" y="0" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-weight="800" font-size="72" fill="url(#accent)">Science</text>
    <text y="42" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-weight="400" font-size="20" fill="#cbd5e1">Type a physics or chemistry problem in plain English. Watch it come alive.</text>
    <text y="78" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="500" font-size="14" fill="#94a3b8">AI parsing → 2D SVG simulations → step-by-step derivations → live telemetry</text>
  </g>

  <!-- Floating particles -->
  <g filter="url(#soft)">
    <circle cx="1040" cy="80"  r="6"  fill="#22d3ee" opacity="0.9"/>
    <circle cx="1100" cy="130" r="4"  fill="#818cf8" opacity="0.8"/>
    <circle cx="1060" cy="200" r="8"  fill="#c084fc" opacity="0.7"/>
    <circle cx="1130" cy="250" r="5"  fill="#22d3ee" opacity="0.85"/>
    <circle cx="980"  cy="260" r="3"  fill="#818cf8" opacity="0.7"/>
  </g>

  <!-- Trajectory arc -->
  <path d="M960 300 Q1060 80 1160 300" fill="none" stroke="url(#accent)" stroke-width="2" stroke-dasharray="4 6" opacity="0.7"/>

  <!-- Stat pills along bottom -->
  <g transform="translate(260 250)" font-family="Inter, system-ui, sans-serif">
    <g>
      <rect width="130" height="44" rx="12" fill="rgba(34,211,238,0.12)" stroke="rgba(34,211,238,0.35)"/>
      <text x="65" y="22" text-anchor="middle" font-size="20" font-weight="700" fill="#22d3ee">23</text>
      <text x="65" y="37" text-anchor="middle" font-size="10" letter-spacing="1" fill="#94a3b8">SIMULATIONS</text>
    </g>
    <g transform="translate(145 0)">
      <rect width="130" height="44" rx="12" fill="rgba(129,140,248,0.12)" stroke="rgba(129,140,248,0.35)"/>
      <text x="65" y="22" text-anchor="middle" font-size="20" font-weight="700" fill="#818cf8">4</text>
      <text x="65" y="37" text-anchor="middle" font-size="10" letter-spacing="1" fill="#94a3b8">AI PROVIDERS</text>
    </g>
    <g transform="translate(290 0)">
      <rect width="130" height="44" rx="12" fill="rgba(192,132,252,0.12)" stroke="rgba(192,132,252,0.35)"/>
      <text x="65" y="22" text-anchor="middle" font-size="20" font-weight="700" fill="#c084fc">2</text>
      <text x="65" y="37" text-anchor="middle" font-size="10" letter-spacing="1" fill="#94a3b8">DOMAINS</text>
    </g>
    <g transform="translate(435 0)">
      <rect width="150" height="44" rx="12" fill="rgba(34,211,238,0.12)" stroke="rgba(34,211,238,0.35)"/>
      <text x="75" y="22" text-anchor="middle" font-size="20" font-weight="700" fill="#22d3ee">0</text>
      <text x="75" y="37" text-anchor="middle" font-size="10" letter-spacing="1" fill="#94a3b8">WEBGL DEPS</text>
    </g>
  </g>
</svg>
